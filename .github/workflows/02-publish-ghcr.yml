name: 02 - Publish GHCR

# Publie l'image sur GitHub Container Registry apres un push sur main.
on:
  push:
    branches: [ main ]
  workflow_dispatch:

# Permissions minimales : ecrire dans GHCR via le GITHUB_TOKEN.
permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      # Connexion a GHCR avec le token automatique fourni par GitHub.
      # Aucun secret n'est ecrit dans le code.
      - name: Connexion a GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Genere automatiquement des tags coherents.
      - name: Preparation des tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=sha,format=long
            type=raw,value=recette

      - name: Build et push de l'image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      # Affiche le digest : preuve d'identification unique de l'artefact.
      - name: Afficher le digest de l'image
        run: |
          echo "Image publiee sur GHCR."
          echo "Tags : ${{ steps.meta.outputs.tags }}"
          echo "Digest : ${{ steps.build.outputs.digest }}"
          echo "### Image publiee sur GHCR :rocket:" >> $GITHUB_STEP_SUMMARY
          echo "- **Digest** : \`${{ steps.build.outputs.digest }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Tags** :" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY