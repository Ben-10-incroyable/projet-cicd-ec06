# Reverse proxy : "web" resout vers TOUTES les instances du service web
# (round-robin via le DNS interne de Docker) quand on scale.
upstream web_backend {
    server web:80;
}

server {
    listen 80;
    location / {
        proxy_pass http://web_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        # En-tete qui prouve quelle instance a repondu (utile pour la demo de scaling)
        add_header X-Served-By $upstream_addr always;
    }
}